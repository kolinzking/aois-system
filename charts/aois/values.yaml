replicaCount: 1

image:
  repository: ghcr.io/kolinzking/aois
  tag: v7
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

namespace: aois

service:
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: traefik
  host: aois.46.225.235.51.nip.io
  clusterIssuer: letsencrypt-prod
  tlsSecretName: aois-tls

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

secretName: aois-secrets

serviceAccount:
  name: ""   # set to IRSA service account name on EKS

keda:
  enabled: false        # set true in values.prod.yaml to activate
  minReplicas: 1        # 0 = scale-to-zero (requires non-CPU trigger)
  maxReplicas: 10
  cooldownPeriod: 300   # seconds before scaling back down after last event
  pollingInterval: 30   # seconds between KEDA metric checks
  cpu:
    targetUtilization: "50"   # percent — scale up when CPU exceeds this
