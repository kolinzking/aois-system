replicaCount: 1

image:
  repository: ghcr.io/kolinzking/aois
  tag: v7
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: ghcr-secret

namespace: aois

service:
  port: 80
  targetPort: 8000

ingress:
  enabled: true
  className: traefik
  host: aois.46.225.235.51.nip.io
  clusterIssuer: letsencrypt-prod
  tlsSecretName: aois-tls

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10

secretName: aois-secrets
