replicaCount: 2

image:
  tag: v6  # v9 is pure infra (KEDA) — no app code changes

ingress:
  host: aois.46.225.235.51.nip.io

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cooldownPeriod: 300
  cpu:
    targetUtilization: "60"
  kafka:
    enabled: true             # switch to Kafka-based scaling once Strimzi is deployed
    bootstrapServers: "aois-kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
    consumerGroup: "aois-workers"
    topic: "aois-logs"
    lagThreshold: "50"
