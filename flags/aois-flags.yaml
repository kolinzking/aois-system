flags:
  use-opus-4-7:
    state: ENABLED
    variants:
      'on': true
      'off': false
    defaultVariant: 'off'
    targeting:
      fractionalEvaluation:
        - '$flagd/flagKey'
        - ['on', 5]
        - ['off', 95]

  enable-extended-thinking:
    state: ENABLED
    variants:
      'on': true
      'off': false
    defaultVariant: 'off'
    targeting:
      if:
        - in:
          - var: severity
          - - P1
        - 'on'
        - 'off'

  model-tier-override:
    state: DISABLED
    variants:
      haiku: 'claude-haiku-4-5-20251001'
      sonnet: 'claude-sonnet-4-6'
      opus: 'claude-opus-4-7'
    defaultVariant: haiku
