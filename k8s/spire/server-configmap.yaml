apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-server
  namespace: spire
data:
  server.conf: |
    server {
      bind_address = "0.0.0.0"
      bind_port = "8081"
      socket_path = "/tmp/spire-server/private/api.sock"
      trust_domain = "aois.local"
      data_dir = "/run/spire/data"
      log_level = "INFO"
      jwt_issuer = "oidc.aois.local"
    }

    plugins {
      DataStore "sql" {
        plugin_data {
          database_type = "sqlite3"
          connection_string = "/run/spire/data/datastore.sqlite3"
        }
      }

      # k8s_psat: node attestor using Projected Service Account Tokens.
      # Works on k3s: the agent pod carries a projected token with audience "spire-server".
      # The server validates it via the k8s TokenReview API.
      NodeAttestor "k8s_psat" {
        plugin_data {
          clusters = {
            "aois-cluster" = {
              service_account_allow_list = ["spire:spire-agent"]
              audience = ["spire-server"]
            }
          }
        }
      }

      KeyManager "disk" {
        plugin_data {
          keys_path = "/run/spire/data/keys.json"
        }
      }

      # Publishes the trust bundle to a ConfigMap so agents can bootstrap.
      # k8s_bundle notifier removed in SPIRE 1.10 — trust bundle is bootstrapped
      # manually after first start (see deployment notes below).
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }
---
# Placeholder ConfigMap — SPIRE server writes the real trust bundle here on startup.
apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-bundle
  namespace: spire
