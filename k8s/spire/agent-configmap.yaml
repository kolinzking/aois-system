apiVersion: v1
kind: ConfigMap
metadata:
  name: spire-agent
  namespace: spire
data:
  agent.conf: |
    agent {
      data_dir = "/run/spire"
      log_level = "INFO"
      server_address = "spire-server"
      server_port = "8081"
      socket_path = "/run/spire/sockets/agent.sock"
      trust_bundle_path = "/run/spire/bundle/bundle.crt"
      trust_domain = "aois.local"
    }

    plugins {
      # k8s_psat: node attestor using a projected service account token.
      # The token is mounted into this pod (see DaemonSet volumeMounts).
      # Audience "spire-server" matches the server's NodeAttestor config.
      NodeAttestor "k8s_psat" {
        plugin_data {
          cluster = "aois-cluster"
          token_path = "/var/run/secrets/tokens/spire-agent"
        }
      }

      KeyManager "memory" {
        plugin_data {}
      }

      # k8s workload attestor: identifies workloads by their k8s service account,
      # namespace, and pod labels by querying the kubelet API.
      # skip_kubelet_verification = true is required on k3s: the kubelet uses a
      # self-signed certificate that the attestor cannot verify otherwise.
      # k8s workload attestor.
      # k3s disables the kubelet read-only port (10255) and its authenticated
      # port (10250) uses client certificate auth that the attestor cannot satisfy.
      # use_new_container_locator = true: reads /proc/<pid>/cgroup to find the
      # container ID, then queries the k8s API server (not the kubelet) for pod
      # metadata. Requires hostPID: true on the agent DaemonSet (already set).
      WorkloadAttestor "k8s" {
        plugin_data {
          skip_kubelet_verification = true
          use_new_container_locator = true
        }
      }
    }

    health_checks {
      listener_enabled = true
      bind_address = "0.0.0.0"
      bind_port = "8080"
      live_path = "/live"
      ready_path = "/ready"
    }
