apiVersion: apps/v1
kind: Deployment
metadata:
  name: aois
  namespace: aois
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aois
  template:
    metadata:
      labels:
        app: aois
    spec:
      containers:
      - name: aois
        image: ghcr.io/kolinzking/aois:v6
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: aois-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
