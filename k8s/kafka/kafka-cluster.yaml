---
# Single-node Kafka cluster for Hetzner k3s (dev/learning tier).
# KRaft mode — no ZooKeeper. 1 replica, persistent storage (local-path).
# Persistent storage required: ephemeral causes quorum-state epoch corruption in KRaft mode
# (quorum-state file at epoch 0, metadata log advances to epoch N, Strimzi startup wrapper aborts).
# For production: increase replicas to 3.
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaNodePool
metadata:
  name: combined
  namespace: kafka
  labels:
    strimzi.io/cluster: aois-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  jvmOptions:
    "-Xms": "256m"
    "-Xmx": "512m"
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "768Mi"
      cpu: "1000m"
---
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: aois-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: "4.1"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      auto.create.topics.enable: "true"
      log.retention.hours: 24
  entityOperator:
    topicOperator: {}
