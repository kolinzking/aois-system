apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: aoistenants.aois.io
spec:
  group: aois.io
  names:
    kind: AoisTenant
    plural: aoistenants
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [teamName, modelTier]
              properties:
                teamName:
                  type: string
                  description: "Team name — used for namespace and resource naming"
                modelTier:
                  type: string
                  enum: [standard, premium]
                  default: standard
                alertWebhook:
                  type: string
                  description: "Slack/PagerDuty webhook for P1 alerts"
                region:
                  type: string
                  default: nbg1
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: aoistenants.aois.io
spec:
  compositeTypeRef:
    apiVersion: aois.io/v1alpha1
    kind: AoisTenant
  resources:
    - name: namespace
      base:
        apiVersion: kubernetes.crossplane.io/v1alpha1
        kind: Object
        spec:
          forProvider:
            manifest:
              apiVersion: v1
              kind: Namespace
              metadata:
                labels:
                  aois.io/managed: "true"
      patches:
        - fromFieldPath: spec.teamName
          toFieldPath: spec.forProvider.manifest.metadata.name
          transforms:
            - type: string
              string:
                fmt: "%s-aois"
